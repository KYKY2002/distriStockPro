# Bonus CI/CD : construction des images à chaque push (adapter les secrets Docker Hub)
name: Build Docker images

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Connexion Docker Hub optionnelle : le job ne doit pas échouer si les secrets ne sont pas configurés.
      - name: Login to Docker Hub (optional)
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build inventory image
        uses: docker/build-push-action@v6
        with:
          context: ./inventory-app
          push: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/distristock-inventory:latest

      - name: Build sales image
        uses: docker/build-push-action@v6
        with:
          context: ./sales-app
          push: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/distristock-sales:latest
