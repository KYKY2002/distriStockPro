# Bonus CI/CD : construction des images à chaque push (adapter les secrets Docker Hub)
name: Build Docker images

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Décommenter et renseigner les secrets DOCKERHUB_USERNAME / DOCKERHUB_TOKEN pour pousser sur Docker Hub
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build inventory image
        uses: docker/build-push-action@v6
        with:
          context: ./inventory-app
          push: false
          tags: distristock/inventory-app:latest

      - name: Build sales image
        uses: docker/build-push-action@v6
        with:
          context: ./sales-app
          push: false
          tags: distristock/sales-app:latest
