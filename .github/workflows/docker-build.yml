# Bonus CI/CD : construction des images à chaque push (adapter les secrets Docker Hub)
name: Build Docker images

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      push_to_dockerhub:
        description: "Pousser les images vers Docker Hub (nécessite des secrets)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Push Docker Hub optionnel : activable manuellement via workflow_dispatch.
      # On évite ainsi de bloquer la CI sur des secrets absents.
      - name: Login to Docker Hub (only when enabled)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.push_to_dockerhub == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build inventory image
        uses: docker/build-push-action@v6
        with:
          context: ./inventory-app
          push: ${{ github.event_name == 'workflow_dispatch' && inputs.push_to_dockerhub == 'true' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/distristock-inventory:latest

      - name: Build sales image
        uses: docker/build-push-action@v6
        with:
          context: ./sales-app
          push: ${{ github.event_name == 'workflow_dispatch' && inputs.push_to_dockerhub == 'true' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/distristock-sales:latest
