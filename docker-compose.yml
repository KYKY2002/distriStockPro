# =============================================================================
# DistriStock Pro — Orchestration multi-conteneurs
# Réseau bridge isolé "distrinet" : communication East-West entre services.
# =============================================================================
services:
  database:
    image: postgres:16-alpine
    container_name: distristock-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-distriuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-distripass}
      POSTGRES_DB: ${POSTGRES_DB:-distristock}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - distrinetwork
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-distriuser} -d ${POSTGRES_DB:-distristock}"]
      interval: 5s
      timeout: 5s
      retries: 5

  inventory-app:
    build:
      context: ./inventory-app
      dockerfile: Dockerfile
    container_name: distristock-inventory
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-distriuser}:${POSTGRES_PASSWORD:-distripass}@database:5432/${POSTGRES_DB:-distristock}
      INVENTORY_PORT: "5001"
    ports:
      - "5001:5001"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - distrinetwork

  sales-app:
    build:
      context: ./sales-app
      dockerfile: Dockerfile
    container_name: distristock-sales
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-distristock-dev-secret-change-me}
      DATABASE_URL: postgresql://${POSTGRES_USER:-distriuser}:${POSTGRES_PASSWORD:-distripass}@database:5432/${POSTGRES_DB:-distristock}
      # URL interne résolue par le DNS Docker (nom du service = hostname)
      INVENTORY_SERVICE_URL: http://inventory-app:5001
      SALES_PORT: "5000"
    ports:
      - "5000:5000"
    depends_on:
      database:
        condition: service_healthy
      inventory-app:
        condition: service_started
    networks:
      - distrinetwork

volumes:
  postgres_data:

networks:
  distrinetwork:
    name: distrinetwork
    driver: bridge
